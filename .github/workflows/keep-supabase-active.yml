name: Keep Supabase Active

on:
  schedule:
    # Daily keep-alive so the project stays above Supabase inactivity thresholds
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Send Supabase keep-alive ping
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are not configured."
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/")

          echo "Supabase ping response code: $HTTP_CODE"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Successfully pinged Supabase project. Project kept active."
          else
            echo "::error::Supabase ping failed with HTTP $HTTP_CODE"
            exit 1
          fi
