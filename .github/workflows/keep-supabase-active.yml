name: Keep Supabase Active

on:
  schedule:
    # Daily keep-alive so the project stays above Supabase inactivity thresholds
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Send Supabase keep-alive ping
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          # We make a simple HTTP GET request to the Supabase REST API root endpoint.
          # This queries the OpenAPI spec and constitutes database activity to keep the project active.
          
          SUPABASE_URL="https://ypbqqwevnxqnooplvdyn.supabase.co"
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwYnFxd2V2bnhxbm9vcGx2ZHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MzM1MTIsImV4cCI6MjA4NDUwOTUxMn0.YTCg0DK3L2p6Ol3JpNmf9cy1Yxaygqlh9OwJ-jBQpqY"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            $SUPABASE_URL/rest/v1/)
          
          echo "Supabase ping response code: $HTTP_CODE"
          
          if [[ "$HTTP_CODE" -eq 200 ]]; then
            echo "Successfully pinged Supabase project. Prevention active."
          else
            echo "Failed to ping. HTTP Code: $HTTP_CODE"
            exit 1
          fi
